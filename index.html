<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ECC33 - Validador de Livretos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <style>
        body {
            transition: background-color 0.3s ease;
            background-color: #f8f9fa;
        }
        .flash-success { background-color: rgba(40, 167, 69, 0.6) !important; }
        .flash-error { background-color: rgba(220, 53, 69, 0.7) !important; }
        
        #reader {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            background-color: #fff;
        }
        
        #reader__dashboard_section_csr span { display: none !important; } 

        .marquee-container {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            background-color: #e9ecef;
            padding: 5px 0;
            margin-bottom: 10px;
        }
        
        .marquee-content {
            display: inline-block;
            animation: marquee 15s linear infinite;
        }
        
        @keyframes marquee {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }

        .status-compacto {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 15px;
        }
        
        .pagina-numero {
            font-size: 2.5rem;
            font-weight: bold;
            line-height: 1;
        }
    </style>
</head>
<body class="min-vh-100 d-flex flex-column align-items-center py-2">

    <div class="marquee-container">
        <div class="marquee-content">
            <img src="https://i.imghippo.com/files/gzO5663sTo.png" alt="Logo ECC" style="max-height: 35px; margin-right: 20px;">
            <span class="fw-bold text-secondary align-middle">Encontro de Casais com Cristo 33 - Unindo Corações</span>
        </div>
    </div>

    <div class="container text-center w-100 flex-grow-1" style="max-width: 500px;">
        
        <div class="d-flex justify-content-center align-items-center mb-3 position-relative">
            <h3 class="m-0 text-primary">Secretaria ECC 33 - v2.1</h3>
            <button class="btn btn-sm btn-outline-secondary position-absolute end-0" data-bs-toggle="modal" data-bs-target="#modalConfig">
                ⚙️
            </button>
        </div>
        
        <div id="reader" class="mb-3"></div>

        <div class="card shadow-sm mb-3">
            <div class="card-body status-compacto">
                <div class="text-start">
                    <p class="text-muted mb-0 small">Aguardando:</p>
                    <p class="mt-1 mb-0 fw-bold" id="mensagemStatus" style="font-size: 0.9rem;">Aponte P01</p>
                </div>
                <div class="text-primary pagina-numero" id="paginaEsperadaDisplay">01</div>
            </div>
        </div>

        <div class="d-flex gap-2 mb-4">
            <button class="btn btn-warning flex-grow-1" onclick="iniciarNovoLivreto()">
                🔄 Reiniciar Livreto
            </button>
            
            <button id="btnContinuar" class="btn btn-danger flex-grow-1 d-none" onclick="retomarLeitura()">
                ⚠️ Continuar
            </button>
        </div>
    </div>

    <footer class="mt-auto py-3 w-100 text-center border-top" style="background-color: #e9ecef;">
        <div class="container small text-muted">
            <span class="fw-bold text-secondary">IEQ Templo Labaredas de Fogo</span><br>
            Desenvolvido para a Secretaria do ECC 33
        </div>
    </footer>

    <div class="modal fade" id="modalConfig" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-light">
                    <h5 class="modal-title">⚙️ Configurações</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body text-start">
                    <label class="form-label fw-bold text-primary">Ordem das Páginas</label>
                    <p class="small text-muted mb-2">Digite a sequência esperada, um código por linha.</p>
                    <textarea id="textoConfiguracao" class="form-control text-uppercase" rows="10"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="salvarConfiguracoes()">Salvar Ordem</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Variáveis Globais
        let listaPaginas = [];
        let indiceAtual = 0; 
        let isPausado = false;
        let ultimaPaginaLida = ""; 
        let html5QrcodeScanner;
        let timerInatividade = null;
        let quadrosVazios = 0; 
        
        const TEMPO_ALERTA_INATIVIDADE = 15000; 

        // --- SISTEMA DE CONFIGURAÇÃO DA ORDEM ---
        function carregarConfiguracoes() {
            let salva = localStorage.getItem('sequenciaLivroECC');
            if (salva) {
                listaPaginas = salva.split('\n').map(p => p.trim().toUpperCase()).filter(p => p !== "");
            } else {
                listaPaginas = [];
                for(let i=1; i<=35; i++) {
                    listaPaginas.push("P" + i.toString().padStart(2, '0'));
                }
            }
            document.getElementById('textoConfiguracao').value = listaPaginas.join('\n');
        }

        function salvarConfiguracoes() {
            let texto = document.getElementById('textoConfiguracao').value;
            listaPaginas = texto.split('\n').map(p => p.trim().toUpperCase()).filter(p => p !== "");
            localStorage.setItem('sequenciaLivroECC', listaPaginas.join('\n'));
            
            var modal = bootstrap.Modal.getInstance(document.getElementById('modalConfig'));
            modal.hide();
            
            iniciarNovoLivreto();
        }

        // --- GERADOR DE BIPES E VIBRAÇÃO ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function tocarFeedback(tipo) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (tipo === 'sucesso') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(800, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.1); 
            } else if (tipo === 'erro') {
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(250, audioCtx.currentTime); 
                oscillator.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.3); 
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.3); 
                
                if (navigator.vibrate) navigator.vibrate([200, 100, 200]);

            } else if (tipo === 'final') {
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(500, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.6); 
                if (navigator.vibrate) navigator.vibrate([500]); 
            } else if (tipo === 'alerta') {
                oscillator.type = 'triangle';
                oscillator.frequency.setValueAtTime(400, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.2); 
            }
        }

        // --- LÓGICA DO SISTEMA ---
        function obterPaginaEsperada() {
            return listaPaginas[indiceAtual];
        }

        function atualizarUI() {
            let paginaEsperada = obterPaginaEsperada();
            document.getElementById('paginaEsperadaDisplay').innerText = paginaEsperada || "FIM";
            document.getElementById('mensagemStatus').innerText = `Aponte para o QR Code ${paginaEsperada}`;
            document.body.style.backgroundColor = "#f8f9fa"; 
            iniciarCronometroInatividade();
        }

        function iniciarCronometroInatividade() {
            clearTimeout(timerInatividade);
            if (isPausado) return;
            
            timerInatividade = setTimeout(() => {
                tocarFeedback('alerta');
                document.body.style.backgroundColor = "#fff3cd"; 
                document.getElementById('mensagemStatus').innerHTML = `⚠️ <b>Cadê abençoado(a) o QR Code?</b><br>Página está Invertida?`;
            }, TEMPO_ALERTA_INATIVIDADE); 
        }

        function iniciarNovoLivreto() {
            indiceAtual = 0; 
            ultimaPaginaLida = ""; 
            quadrosVazios = 0;
            retomarLeitura();
            atualizarUI();
        }

        function retomarLeitura() {
            isPausado = false;
            document.getElementById('btnContinuar').classList.add('d-none');
            
            if (indiceAtual < listaPaginas.length) {
                document.getElementById('mensagemStatus').innerText = `Aponte para o QR Code ${obterPaginaEsperada()}`;
                document.body.style.backgroundColor = "#f8f9fa";
                iniciarCronometroInatividade();
            }
        }

        function onScanSuccess(decodedText, decodedResult) {
            if (isPausado) return; 

            clearTimeout(timerInatividade);
            quadrosVazios = 0; 

            const paginaEsperada = obterPaginaEsperada();
            const lido = decodedText.trim().toUpperCase();

            if (lido === ultimaPaginaLida) {
                iniciarCronometroInatividade(); 
                return; 
            }

            if (lido === "INV" || lido === "INVERTIDA") {
                isPausado = true;
                tocarFeedback('erro');
                document.body.classList.add('flash-error');
                setTimeout(() => document.body.classList.remove('flash-error'), 400);
                
                document.getElementById('mensagemStatus').innerHTML = `❌ <b>PÁGINA INVERTIDA!</b>`;
                document.getElementById('btnContinuar').classList.remove('d-none');
                return;
            }

            if (lido === paginaEsperada) {
                ultimaPaginaLida = lido; 
                
                tocarFeedback('sucesso');
                document.body.classList.add('flash-success');
                setTimeout(() => document.body.classList.remove('flash-success'), 400); 

                indiceAtual++; 

                if (indiceAtual >= listaPaginas.length) {
                    tocarFeedback('final');
                    isPausado = true;
                    ultimaPaginaLida = ""; 
                    document.getElementById('mensagemStatus').innerText = "✅ MONTADO COM SUCESSO!";
                    document.getElementById('paginaEsperadaDisplay').innerText = "FIM";
                    document.body.style.backgroundColor = "#f8f9fa";
                } else {
                    atualizarUI();
                }

            } else {
                isPausado = true;
                tocarFeedback('erro');
                document.body.classList.add('flash-error');
                setTimeout(() => document.body.classList.remove('flash-error'), 400);
                
                document.getElementById('mensagemStatus').innerText = `❌ ERRO: Leu ${lido}. Esperava ${paginaEsperada}.`;
                document.getElementById('btnContinuar').classList.remove('d-none');
            }
        }

        function onScanFailure(error) {
            if (isPausado) return;
            
            quadrosVazios++;
            if (quadrosVazios > 5) {
                ultimaPaginaLida = ""; 
            }
        }

        document.addEventListener("DOMContentLoaded", function() {
            carregarConfiguracoes(); 
            
            html5QrcodeScanner = new Html5QrcodeScanner(
                "reader", 
                { 
                    fps: 10, 
                    qrbox: {width: 250, height: 250}, 
                    aspectRatio: 1.0,
                    supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
                }, 
                false
            );
            html5QrcodeScanner.render(onScanSuccess, onScanFailure);
            atualizarUI();
        });
    </script>
</body>
</html>
