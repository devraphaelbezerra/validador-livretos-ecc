<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Validador de Livretos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    
    <style>
        body {
            transition: background-color 0.3s ease;
            background-color: #f8f9fa;
        }
        .flash-success { background-color: rgba(40, 167, 69, 0.6) !important; }
        .flash-error { background-color: rgba(220, 53, 69, 0.7) !important; }
        
        #reader {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .status-card {
            font-size: 1.5rem;
            font-weight: bold;
        }
    </style>
</head>
<body class="min-vh-100 d-flex flex-column align-items-center py-4">

    <div class="container text-center">
        <h2 class="mb-3 text-primary">ECC33 Secretaria - AntiFuro</h2>
        
        <div id="reader" class="mb-4"></div>

        <div class="card shadow-sm mb-4 mx-auto" style="max-width: 500px;">
            <div class="card-body">
                <p class="text-muted mb-1">Aguardando Página:</p>
                <div class="status-card text-primary display-4" id="paginaEsperadaDisplay">01</div>
                <p class="mt-2 mb-0" id="mensagemStatus">Aponte para o QR Code P01</p>
            </div>
        </div>

        <button class="btn btn-warning btn-lg mb-3 w-100" style="max-width: 500px;" onclick="iniciarNovoLivreto()">
            🔄 Reiniciar Livreto
        </button>
        
        <button id="btnContinuar" class="btn btn-danger btn-lg w-100 d-none" style="max-width: 500px;" onclick="retomarLeitura()">
            ⚠️ Erro! Clique para Continuar
        </button>
    </div>

    <script>
        const TOTAL_PAGINAS = 35;
        let paginaAtual = 1;
        let isPausado = false;
        let emCooldown = false; // NOVO: Variável que controla o tempo de respiro
        let html5QrcodeScanner;

        // --- GERADOR DE BIPES NATIVO ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function tocarBipe(tipo) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (tipo === 'sucesso') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(800, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.1); 
            } else if (tipo === 'erro') {
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(200, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.4); 
            } else if (tipo === 'final') {
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(500, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.6); 
            }
        }

        // --- LÓGICA DO SISTEMA ---
        function formatarPagina(numero) {
            return "P" + numero.toString().padStart(2, '0');
        }

        function atualizarUI() {
            document.getElementById('paginaEsperadaDisplay').innerText = formatarPagina(paginaAtual);
            document.getElementById('mensagemStatus').innerText = `Aponte para o QR Code ${formatarPagina(paginaAtual)}`;
        }

        function iniciarNovoLivreto() {
            paginaAtual = 1;
            retomarLeitura();
            atualizarUI();
        }

        function retomarLeitura() {
            isPausado = false;
            emCooldown = false;
            document.getElementById('btnContinuar').classList.add('d-none');
            document.getElementById('mensagemStatus').innerText = `Aponte para o QR Code ${formatarPagina(paginaAtual)}`;
        }

        function onScanSuccess(decodedText, decodedResult) {
            // NOVO: Se estiver pausado por erro OU no tempo de respiro, ignora a leitura
            if (isPausado || emCooldown) return; 

            const paginaEsperada = formatarPagina(paginaAtual);
            const lido = decodedText.trim().toUpperCase();

            if (lido === paginaEsperada) {
                // SUCESSO
                emCooldown = true; // Ativa a trava de leitura
                tocarBipe('sucesso');
                document.body.classList.add('flash-success');
                
                // NOVO: Remove a tela verde e libera a trava após 1.5 segundos (1500ms)
                setTimeout(() => { 
                    document.body.classList.remove('flash-success');
                    emCooldown = false; 
                }, 1500); 

                paginaAtual++;

                if (paginaAtual > TOTAL_PAGINAS) {
                    tocarBipe('final');
                    isPausado = true;
                    document.getElementById('mensagemStatus').innerText = "✅ LIVRETO MONTADO COM SUCESSO!";
                    document.getElementById('paginaEsperadaDisplay').innerText = "FIM";
                } else {
                    atualizarUI();
                }

            } else {
                // ERRO - PÁGINA ERRADA
                isPausado = true;
                tocarBipe('erro');
                document.body.classList.add('flash-error');
                setTimeout(() => document.body.classList.remove('flash-error'), 400);
                
                document.getElementById('mensagemStatus').innerText = `❌ ERRO: Leu ${lido}. Esperava ${paginaEsperada}.`;
                document.getElementById('btnContinuar').classList.remove('d-none');
            }
        }

        function onScanFailure(error) {
            // Ignora silenciosamente
        }

        // --- INICIALIZAR CÂMERA ---
        document.addEventListener("DOMContentLoaded", function() {
            html5QrcodeScanner = new Html5QrcodeScanner(
                "reader", 
                { fps: 10, qrbox: {width: 250, height: 250}, aspectRatio: 1.0 }, 
                false
            );
            html5QrcodeScanner.render(onScanSuccess, onScanFailure);
            atualizarUI();
        });
    </script>
</body>
</html>
