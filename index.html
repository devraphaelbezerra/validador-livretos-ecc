<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Validador de Livretos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    
    <style>
        body {
            transition: background-color 0.3s ease;
            background-color: #f8f9fa;
        }
        .flash-success { background-color: rgba(40, 167, 69, 0.6) !important; }
        .flash-error { background-color: rgba(220, 53, 69, 0.7) !important; }
        
        #reader {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            background-color: #fff;
        }
        
        /* Ajuste fino para esconder qualquer botão residual de arquivo caso a lib atualize */
        #reader__dashboard_section_csr span { display: none !important; } 

        /* NOVO: Animação de Letreiro (Marquee) */
        .marquee-container {
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
            background-color: #e9ecef;
            padding: 5px 0;
            margin-bottom: 10px;
        }
        
        .marquee-content {
            display: inline-block;
            animation: marquee 15s linear infinite;
        }
        
        @keyframes marquee {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }

        /* Otimização do Card de Status */
        .status-compacto {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 15px;
        }
        
        .pagina-numero {
            font-size: 2.5rem;
            font-weight: bold;
            line-height: 1;
        }
    </style>
</head>
<body class="min-vh-100 d-flex flex-column align-items-center py-2">

    <div class="marquee-container">
        <div class="marquee-content">
            <img src="https://far-peach-a8snbzt6eu.edgeone.app/ECC%2030%20Com%20Transparencia.png" alt="Logo ECC" style="max-height: 35px; margin-right: 20px;">
            <span class="fw-bold text-secondary align-middle">Encontro de Casais com Cristo 33 - Unindo Corações</span>
        </div>
    </div>

    <div class="container text-center w-100" style="max-width: 500px;">
        <h3 class="mb-2 text-primary">Secretaria ECC 33 - v1.7</h3>
        
        <div id="reader" class="mb-3"></div>

        <div class="card shadow-sm mb-3">
            <div class="card-body status-compacto">
                <div class="text-start">
                    <p class="text-muted mb-0 small">Aguardando:</p>
                    <p class="mt-1 mb-0 fw-bold" id="mensagemStatus" style="font-size: 0.9rem;">Aponte P01</p>
                </div>
                <div class="text-primary pagina-numero" id="paginaEsperadaDisplay">01</div>
            </div>
        </div>

        <div class="d-flex gap-2">
            <button class="btn btn-warning flex-grow-1" onclick="iniciarNovoLivreto()">
                🔄 Reiniciar Livreto
            </button>
            
            <button id="btnContinuar" class="btn btn-danger flex-grow-1 d-none" onclick="retomarLeitura()">
                ⚠️ Continuar
            </button>
        </div>
    </div>

    <script>
        const TOTAL_PAGINAS = 35;
        let paginaAtual = 1;
        let isPausado = false;
        let ultimaPaginaLida = ""; 
        let html5QrcodeScanner;
        
        let timerInatividade = null;
        let quadrosVazios = 0; 
        
        // ---> AQUI VOCÊ ALTERA O TEMPO DE INATIVIDADE (em milissegundos) <---
        const TEMPO_ALERTA_INATIVIDADE = 15000; // Alterado para 15 segundos (15000ms)

        // --- GERADOR DE BIPES NATIVO ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function tocarBipe(tipo) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (tipo === 'sucesso') {
                oscillator.type = 'sine';
                oscillator.frequency.setValueAtTime(800, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.1); 
            } else if (tipo === 'erro') {
                oscillator.type = 'sawtooth';
                oscillator.frequency.setValueAtTime(200, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.4); 
            } else if (tipo === 'final') {
                oscillator.type = 'square';
                oscillator.frequency.setValueAtTime(500, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.6); 
            } else if (tipo === 'alerta') {
                oscillator.type = 'triangle';
                oscillator.frequency.setValueAtTime(400, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.2); 
            }
        }

        // --- LÓGICA DO SISTEMA ---
        function formatarPagina(numero) {
            return "P" + numero.toString().padStart(2, '0');
        }

        function atualizarUI() {
            document.getElementById('paginaEsperadaDisplay').innerText = formatarPagina(paginaAtual);
            document.getElementById('mensagemStatus').innerText = `Aponte para o QR Code ${formatarPagina(paginaAtual)}`;
            document.body.style.backgroundColor = "#f8f9fa"; 
            iniciarCronometroInatividade();
        }

        function iniciarCronometroInatividade() {
            clearTimeout(timerInatividade);
            if (isPausado) return;
            
            timerInatividade = setTimeout(() => {
                tocarBipe('alerta');
                document.body.style.backgroundColor = "#fff3cd"; 
                document.getElementById('mensagemStatus').innerHTML = `⚠️ <b>Cadê abençoado(a) o QR Code?</b><br>Página está Invertida?`;
            }, TEMPO_ALERTA_INATIVIDADE); // Usando a variável configurável
        }

        function iniciarNovoLivreto() {
            paginaAtual = 1;
            ultimaPaginaLida = ""; 
            quadrosVazios = 0;
            retomarLeitura();
            atualizarUI();
        }

        function retomarLeitura() {
            isPausado = false;
            document.getElementById('btnContinuar').classList.add('d-none');
            document.getElementById('mensagemStatus').innerText = `Aponte para o QR Code ${formatarPagina(paginaAtual)}`;
            document.body.style.backgroundColor = "#f8f9fa";
            iniciarCronometroInatividade();
        }

        function onScanSuccess(decodedText, decodedResult) {
            if (isPausado) return; 

            clearTimeout(timerInatividade);
            quadrosVazios = 0; 

            const paginaEsperada = formatarPagina(paginaAtual);
            const lido = decodedText.trim().toUpperCase();

            if (lido === ultimaPaginaLida) {
                iniciarCronometroInatividade(); 
                return; 
            }

            if (lido === "INV" || lido === "INVERTIDA") {
                isPausado = true;
                tocarBipe('erro');
                document.body.classList.add('flash-error');
                setTimeout(() => document.body.classList.remove('flash-error'), 400);
                
                document.getElementById('mensagemStatus').innerHTML = `❌ <b>PÁGINA INVERTIDA!</b>`;
                document.getElementById('btnContinuar').classList.remove('d-none');
                return;
            }

            if (lido === paginaEsperada) {
                ultimaPaginaLida = lido; 
                
                tocarBipe('sucesso');
                document.body.classList.add('flash-success');
                setTimeout(() => document.body.classList.remove('flash-success'), 400); 

                paginaAtual++;

                if (paginaAtual > TOTAL_PAGINAS) {
                    tocarBipe('final');
                    isPausado = true;
                    ultimaPaginaLida = ""; 
                    document.getElementById('mensagemStatus').innerText = "✅ MONTADO COM SUCESSO!";
                    document.getElementById('paginaEsperadaDisplay').innerText = "FIM";
                    document.body.style.backgroundColor = "#f8f9fa";
                } else {
                    atualizarUI();
                }

            } else {
                isPausado = true;
                tocarBipe('erro');
                document.body.classList.add('flash-error');
                setTimeout(() => document.body.classList.remove('flash-error'), 400);
                
                document.getElementById('mensagemStatus').innerText = `❌ ERRO: Leu ${lido}. Esperava ${paginaEsperada}.`;
                document.getElementById('btnContinuar').classList.remove('d-none');
            }
        }

        function onScanFailure(error) {
            if (isPausado) return;
            
            quadrosVazios++;
            
            if (quadrosVazios > 5) {
                ultimaPaginaLida = ""; 
            }
        }

        document.addEventListener("DOMContentLoaded", function() {
            html5QrcodeScanner = new Html5QrcodeScanner(
                "reader", 
                { 
                    fps: 10, 
                    qrbox: {width: 250, height: 250}, 
                    aspectRatio: 1.0,
                    supportedScanTypes: [Html5QrcodeScanType.SCAN_TYPE_CAMERA]
                }, 
                false
            );
            html5QrcodeScanner.render(onScanSuccess, onScanFailure);
            atualizarUI();
        });
    </script>
</body>
</html>
